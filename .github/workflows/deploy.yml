name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Groq API Key from repository secret
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          # Replace the __GROQ_API_KEY__ placeholder in app.js with the actual secret
          sed -i "s|__GROQ_API_KEY__|${GROQ_API_KEY}|g" docs/app.js
          echo "API key injected successfully."

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload docs/ as GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
